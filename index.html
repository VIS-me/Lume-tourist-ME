<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lume App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash-screen">
        <div class="loader-container">
            <svg width="120" height="120" viewBox="0 0 100 100" class="lume-logo">
                <circle cx="50" cy="50" r="45" class="outer-circle" />
                <path d="M50 25 L56 40 L72 40 L60 50 L65 65 L50 55 L35 65 L40 50 L28 40 L44 40 Z" class="star-icon" />
                <circle cx="20" cy="20" r="2" class="sparkle s1" />
                <circle cx="85" cy="35" r="2" class="sparkle s2" />
                <circle cx="75" cy="80" r="2" class="sparkle s3" />
            </svg>
            <div class="loading-text">LUME</div>
        </div>
    </div>

    <main id="app-content">
        <section id="home" class="tab-content active">
            <h1>Lume Info</h1>
            <div class="card">
                <h3>Добро пожаловать</h3>
                <p>Здесь будет актуальная информация по вашему ЖК и локации.</p>
            </div>
        </section>

        <section id="services" class="tab-content">
            <h1>Сервисы</h1>
            <div class="services-grid">
                <div class="service-card" onclick="handleReferral('cars')">
                    <span class="emoji">🚗</span>
                    <span>Аренда авто</span>
                </div>
                <div class="service-card" onclick="handleReferral('transfer')">
                    <span class="emoji">✈️</span>
                    <span>Трансфер</span>
                </div>
                <div class="service-card" onclick="handleReferral('excursions')">
                    <span class="emoji">🏔️</span>
                    <span>Экскурсии</span>
                </div>
            </div>
        </section>

        <section id="profile" class="tab-content">
            <h1>Профиль</h1>
            <div class="card user-profile">
                <div id="user-photo" class="avatar"></div>
                <div id="user-name">Загрузка...</div>
            </div>
            <button id="support-btn">Поддержать проект</button>
        </section>
    </main>

    <nav class="toolbar">
        <div class="tab-link active" data-tab="home">
            <svg class="icon"><use xlink:href="#icon-home"></use></svg>
            <span>Главная</span>
        </div>
        <div class="tab-link" data-tab="services">
            <svg class="icon"><use xlink:href="#icon-grid"></use></svg>
            <span>Сервисы</span>
        </div>
        <div class="tab-link" data-tab="profile">
            <svg class="icon"><use xlink:href="#icon-user"></use></svg>
            <span>Профиль</span>
        </div>
    </nav>

    <svg style="display: none;">
        <symbol id="icon-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
        <symbol id="icon-grid" viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm7 0h5v-6H4v6zm0-13v6h5V5h-5z"/></symbol>
        <symbol id="icon-user" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></symbol>
    </svg>

    <script src="app.js"></script>
</body>
</html>
